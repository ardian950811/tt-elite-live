      - name: Esegui lo Scraper
        run: python scraper_tt.py
        
      - name: Salva i nuovi dati
        run: |
          git config --global user.name "Bot"
          git config --global user.email "bot@github.com"
          # Controlliamo se il file esiste davvero prima di aggiungerlo
          if [ -f database_h2h.json ]; then
            git add database_h2h.json
            git commit -m "Aggiornamento dati tramite API"
            git push origin main
          else
            echo "Il file database_h2h.json non esiste, abortisco il commit."
            exit 1
          fi
