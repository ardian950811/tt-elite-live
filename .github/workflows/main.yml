name: update-data

on:
  workflow_dispatch: 
  schedule:
    - cron: '*/15 * * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run scraper script
        run: python scraper_tt.py

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          # CORREZIONE 1: Aggiunto oggi_form.json all'elenco dei file da salvare online
          git add upcoming.json h2h_data.json match_cache.json today_form.json
          git commit -m "Automated update with detailed point caching" || echo "No changes to commit"
          # CORREZIONE 2: Push forzato sul ramo principale origin per evitare blocchi silenziosi
          git push origin main || git push origin master || echo "No changes to push"
