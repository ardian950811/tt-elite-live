name: Aggiornamento Dati TT

on:
  schedule:
    - cron: '0 * * * *' # Avvia lo script al minuto 0 di ogni ora
  workflow_dispatch: # Permette l'avvio manuale tramite pulsante

permissions:
  contents: write

jobs:
  aggiorna-dati:
    runs-on: ubuntu-latest
    steps:
      - name: Clona il repository
        uses: actions/checkout@v4
        
      - name: Installa Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Installa librerie
        run: |
          python -m pip install --upgrade pip
          pip install cloudscraper
          
      - name: Esegui lo Scraper
        run: python scraper_tt.py
        
      - name: Salva i nuovi dati (Commit & Push)
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "action@github.com"
          git add database_h2h.json
          git commit -m "Aggiornamento dati match" || echo "Nessuna modifica da salvare"
          git push origin main
          
