name: aggiorna-dati

on:
  # Permette di avviare lo script manualmente dal tasto "Run workflow"
  workflow_dispatch: 
  # Avvia lo script in automatico ogni 15 minuti (puoi modificare questo valore)
  schedule:
    - cron: '*/15 * * * *'

jobs:
  aggiornamento:
    runs-on: ubuntu-latest

    steps:
      - name: Clona il repository
        uses: actions/checkout@v3

      - name: Installa Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Installa librerie
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Esegui lo Scraper
        run: python scraper_tt.py

      - name: Salva i nuovi dati
        run: |
          git config --global user.name "Bot"
          git config --global user.email "bot@example.com"
          git add database_h2h.json
          git commit -m "Aggiornamento dati API" || echo "Nessun nuovo dato da salvare, salto il commit."
          git push || echo "Niente da pushare al momento."
