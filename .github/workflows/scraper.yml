name: TT Elite Series Scraper

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run scraper script
        run: python main.py

      - name: Commit and push updated JSON files
        run: |
          git config --global user.name "ardian950811"
          git config --global user.email "ardian950811@users.noreply.github.com"
          git add upcoming.json h2h_data.json match_cache.json today.json
          git commit -m "Auto-update TT match data" || echo "No changes to commit"
          git push
