name: TT Elite Series Auto Scraper

on:
  schedule:
    # Esegue lo script ogni 30 minuti. Puoi modificare i minuti a tuo piacimento.
    - cron: '*/30 * * * *'
  workflow_dispatch: # Questo ti permette di avviare il caricamento anche manualmente dal sito di GitHub

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Run data extraction
        # Assicurati che il tuo file Python si chiami esattamente "main.py". 
        # Se lo hai chiamato diversamente, cambia il nome qui sotto.
        run: python main.py

      - name: Commit and push updated JSON files
        run: |
          git config --global user.name "ardian950811"
          git config --global user.email "ardian950811@users.noreply.github.com"
          git add upcoming.json h2h_data.json match_cache.json
          git commit -m "Auto-update TT match data" || echo "No changes to commit"
          git push
