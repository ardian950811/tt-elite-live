<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TT Elite Series - Radar</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #121212; color: #e0e0e0; padding: 15px; }
        .match-card { background: #1e1e1e; padding: 15px; border-radius: 10px; margin-bottom: 20px; border-left: 4px solid #00e676; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .match-header { font-size: 17px; font-weight: bold; margin-bottom: 12px; color: #fff; text-align: center; }
        .history-container { display: flex; flex-direction: column; gap: 10px; }
        .player-box { background: #2a2a2a; padding: 10px; border-radius: 6px; }
        .player-name { font-weight: bold; color: #00e676; margin-bottom: 8px; font-size: 14px; }
        .history-row { display: flex; align-items: center; font-size: 13px; margin-bottom: 5px; }
        .box-v { background: #2e7d32; color: white; width: 24px; height: 24px; display: flex; justify-content: center; align-items: center; border-radius: 4px; margin-right: 8px; font-weight: bold; }
        .box-r { background: #c62828; color: white; width: 24px; height: 24px; display: flex; justify-content: center; align-items: center; border-radius: 4px; margin-right: 8px; font-weight: bold; }
        .no-data { color: #777; font-size: 12px; font-style: italic; }
    </style>
</head>
<body>

    <h2>Prossimi Match & Forma</h2>
    <div id="app"></div>

    <script>
        // Simulazione caricamento dati (nel tuo progetto questi file vengono letti dal server)
        async function loadData() {
            try {
                const [upcoming, form, h2h] = await Promise.all([
                    fetch('upcoming.json').then(r => r.json()),
                    fetch('today_form.json').then(r => r.json()),
                    fetch('h2h_data.json').then(r => r.json())
                ]);

                const app = document.getElementById('app');
                upcoming.results.forEach(match => {
                    const home = match.home.name;
                    const away = match.away.name;
                    const hHistory = form[home] || [];
                    const aHistory = form[away] || [];

                    let html = `
                        <div class="match-card">
                            <div class="match-header">${home} vs ${away}</div>
                            <div class="history-container">
                                <div class="player-box">
                                    <div class="player-name">${home} (Oggi)</div>
                                    ${hHistory.length > 0 ? hHistory.map(m => `
                                        <div class="history-row">
                                            <div class="${m.res === 'V' ? 'box-v' : 'box-r'}">${m.res}</div>
                                            <span>vs ${m.opp} (${m.score})</span>
                                        </div>
                                    `).join('') : '<div class="no-data">Nessun match oggi</div>'}
                                </div>
                                <div class="player-box">
                                    <div class="player-name">${away} (Oggi)</div>
                                    ${aHistory.length > 0 ? aHistory.map(m => `
                                        <div class="history-row">
                                            <div class="${m.res === 'V' ? 'box-v' : 'box-r'}">${m.res}</div>
                                            <span>vs ${m.opp} (${m.score})</span>
                                        </div>
                                    `).join('') : '<div class="no-data">Nessun match oggi</div>'}
                                </div>
                            </div>
                        </div>
                    `;
                    app.innerHTML += html;
                });
            } catch (e) {
                console.error("Errore caricamento:", e);
            }
        }
        loadData();
    </script>
</body>
</html>
