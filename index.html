<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard TT Elite</title>
    <style>
        body { background-color: #121212; color: #e0e0e0; font-family: sans-serif; padding: 10px; }
        .match-card { background: #1e1e1e; border: 2px solid #2d5a4d; border-radius: 10px; padding: 15px; margin-bottom: 20px; }
        .match-header { font-weight: bold; font-size: 1.1em; margin-bottom: 10px; }
        .grid-players { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-bottom: 15px; }
        .player-box { background: #2a2a2a; padding: 10px; border-radius: 5px; text-align: center; }
        .stat-box { background: #2a2a2a; padding: 10px; border-radius: 5px; margin-bottom: 10px; text-align: center; }
        .h2h-row { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid #333; font-size: 0.9em; }
        .pts { color: #f39c12; font-weight: bold; }
        .value-calc { margin-top: 15px; padding-top: 10px; border-top: 1px solid #444; }
    </style>
</head>
<body>

    <div id="container"></div>

    <script>
        async function loadData() {
            const res = await fetch('data.json?t=' + new Date().getTime());
            const data = await res.json();
            const container = document.getElementById('container');
            
            container.innerHTML = data.upcoming.map(m => `
                <div class="match-card">
                    <div class="match-header">${m.time} | ${m.home} vs ${m.away}</div>
                    
                    <div class="grid-players">
                        <div class="player-box">OGGI: ${m.home}<br><b>${data.today_form[m.home]?.filter(x=>x.res=='V').length || 0}V - ${data.today_form[m.home]?.filter(x=>x.res=='R').length || 0}P</b></div>
                        <div class="player-box">OGGI: ${m.away}<br><b>${data.today_form[m.away]?.filter(x=>x.res=='V').length || 0}V - ${data.today_form[m.away]?.filter(x=>x.res=='R').length || 0}P</b></div>
                    </div>

                    <div class="stat-box">Vittorie ${m.home}: <b>${m.p1_wins}</b></div>
                    <div class="stat-box">Vittorie ${m.away}: <b>${m.p2_wins}</b></div>
                    <div class="stat-box">Media Punti: <b style="color:#f39c12">${m.avg_points} pts</b></div>

                    <div class="match-header" style="font-size:0.9em; margin-top:15px;">Storico incontri H2H</div>
                    <div id="h2h-list">
                        <!-- Qui puoi aggiungere un ciclo per mostrare i match H2H se li vuoi in lista -->
                        <div class="h2h-row"><span>Ultimi ${m.total_h2h_count} incontri considerati</span></div>
                    </div>
                </div>
            `).join('');
        }
        loadData();
    </script>
</body>
</html>
