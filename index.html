<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TT Elite Analytics</title>
    <style>
        body { font-family: -apple-system, sans-serif; background-color: #121214; color: #e1e1e6; margin: 0; padding: 15px; }
        .container { max-width: 600px; margin: 0 auto; }
        .match-card { background-color: #29292e; border: 1px solid #323238; border-radius: 8px; padding: 12px; margin: 10px 0; cursor: pointer; }
        .match-details { display: none; margin-top: 10px; border-top: 1px solid #323238; padding-top: 10px; }
        .stat-grid { display: flex; gap: 10px; margin: 10px 0; }
        .stat-box { background: #121214; padding: 10px; border-radius: 6px; flex: 1; text-align: center; }
        .value-bet { border: 2px solid #fba94c !important; }
        .history-item { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid #323238; font-size: 0.9em; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Analytics & Value</h1>
        <div id="list">Caricamento...</div>
    </div>

    <script>
        async function load() {
            const [u, h] = await Promise.all([fetch('upcoming.json?t='+Date.now()), fetch('h2h_data.json?t='+Date.now())]);
            const upcoming = await u.json();
            const h2hDict = await h.json();
            render(upcoming.results, h2hDict);
        }

        function render(matches, h2hDict) {
            const list = document.getElementById('list');
            list.innerHTML = "";
            matches.forEach(m => {
                const h2h = h2hDict[m.id] || [];
                const winsHome = h2h.filter(x => x.home.name === m.home.name).length;
                const winPct = h2h.length > 0 ? Math.round((winsHome / h2h.length) * 100) : 50;
                
                const card = document.createElement('div');
                card.className = 'match-card';
                card.innerHTML = `
                    <div onclick="toggle('${m.id}')">
                        <strong>${m.home.name} vs ${m.away.name}</strong> 
                        <span style="font-size:0.8em; color:#00b37e">(${winPct}% H2H)</span>
                    </div>
                    <div id="det-${m.id}" class="match-details">
                        <div class="stat-grid">
                            <div class="stat-box">Vittorie Home: ${winsHome}</div>
                            <div class="stat-box">Totale match: ${h2h.length}</div>
                        </div>
                        <div id="bet-${m.id}" style="background:#202024; padding:10px; border-radius:6px;">
                            <input type="number" step="0.01" id="q-${m.id}" placeholder="Quota Bookmaker" oninput="calc('${m.id}', ${winPct})">
                            <div id="res-${m.id}" style="margin-top:5px; font-size:0.8em;"></div>
                        </div>
                        <div style="margin-top:10px;">${h2h.map(x => `<div class="history-item">${x.home.name} ${x.ss} ${x.away.name}</div>`).join('')}</div>
                    </div>
                `;
                list.appendChild(card);
            });
        }

        function toggle(id) {
            const d = document.getElementById('det-'+id);
            d.style.display = (d.style.display === 'block') ? 'none' : 'block';
        }

        function calc(id, pct) {
            const q = parseFloat(document.getElementById('q-'+id).value);
            const res = document.getElementById('res-'+id);
            const fair = pct > 0 ? (100 / pct) : 0;
            if(q > fair && q > 1) {
                res.innerHTML = `<span style="color:#fba94c">VALUE BET! (Quota equa ${fair.toFixed(2)})</span>`;
                document.getElementById('bet-'+id).className = 'value-bet';
            } else {
                res.innerHTML = `Quota equa: ${fair.toFixed(2)}`;
                document.getElementById('bet-'+id).className = '';
            }
        }
        load();
    </script>
</body>
</html>
