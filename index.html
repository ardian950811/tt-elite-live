<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sala Operativa TT</title>
    <style>
        body { background-color: #121212; color: #fff; font-family: sans-serif; padding: 10px; }
        .bankroll-bar { background: #333; padding: 15px; border-radius: 8px; margin-bottom: 15px; text-align: center; }
        .match-card { background: #1e1e1e; border: 1px solid #444; border-radius: 10px; padding: 10px; margin-bottom: 15px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin: 10px 0; }
        .box { background: #2a2a2a; padding: 8px; border-radius: 5px; text-align: center; font-size: 0.85em; }
        /* Layout verticale per il calcolatore */
        .value-box { background: #252525; padding: 10px; border-radius: 5px; margin-top: 10px; }
        .calc-input { width: 100%; padding: 8px; margin: 5px 0; box-sizing: border-box; background: #333; border: 1px solid #555; color: white; }
        .btn-row { display: flex; gap: 5px; margin-top: 5px; }
        button { flex: 1; padding: 8px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-test { background: #0d6efd; color: white; }
        .btn-win { background: #28a745; color: white; }
        .btn-loss { background: #dc3545; color: white; }
    </style>
</head>
<body>

    <div class="bankroll-bar">
        Bankroll: <b id="bankroll">1000€</b> | ROI: <b id="roi">0%</b>
    </div>

    <div id="container"></div>

    <script>
        let bankroll = 1000;
        let totaleInvestito = 0;
        let totaleVinto = 0;

        function aggiornaStatistiche(esito, quota, importo) {
            totaleInvestito += importo;
            if (esito === 'vinto') totaleVinto += (importo * quota);
            
            const profitto = totaleVinto - totaleInvestito;
            const roi = totaleInvestito > 0 ? (profitto / totaleInvestito) * 100 : 0;
            document.getElementById('bankroll').innerText = (1000 + profitto).toFixed(2) + "€";
            document.getElementById('roi').innerText = roi.toFixed(1) + "%";
        }

        async function loadData() {
            const res = await fetch('data.json?t=' + new Date().getTime());
            const data = await res.json();
            const container = document.getElementById('container');
            
            container.innerHTML = data.upcoming.map(m => `
                <div class="match-card">
                    <div style="font-weight:bold; margin-bottom:5px;">${m.time} | ${m.home} vs ${m.away}</div>
                    <div class="grid-2">
                        <div class="box">Scontri: ${m.p1_wins}V-${m.p2_wins}V</div>
                        <div class="box">Media: ${m.avg_points} pts</div>
                    </div>
                    
                    <div class="value-box">
                        <input type="number" step="0.01" id="quota_${m.id}" class="calc-input" placeholder="Inserisci Quota">
                        <input type="number" id="importo_${m.id}" class="calc-input" placeholder="Importo €">
                        <div class="btn-row">
                            <button class="btn-test" onclick="testValue('${m.id}', ${m.p1_wins}, ${m.total_h2h_count})">Test Value</button>
                            <button class="btn-win" onclick="aggiornaStatistiche('vinto', document.getElementById('quota_${m.id}').value, parseFloat(document.getElementById('importo_${m.id}').value))">Vinto</button>
                            <button class="btn-loss" onclick="aggiornaStatistiche('perso', 0, parseFloat(document.getElementById('importo_${m.id}').value))">Perso</button>
                        </div>
                        <div id="ris_${m.id}" style="margin-top:5px; font-size:0.8em;"></div>
                    </div>
                </div>
            `).join('');
        }

        function testValue(id, wins, total) {
            const q = parseFloat(document.getElementById('quota_'+id).value);
            const probReale = (wins / total) * 100;
            const probImplicita = (1/q) * 100;
            const res = document.getElementById('ris_'+id);
            res.innerHTML = probReale > probImplicita ? "<b style='color:green'>⚠️ VALUE BET!</b>" : "<b style='color:red'>NO VALUE</b>";
        }

        loadData();
    </script>
</body>
</html>
