<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>TT Elite Dashboard</title>
    <style>
        body { background-color: #121214; color: #e1e1e6; font-family: sans-serif; padding: 20px; }
        .error-box { border: 1px solid #f75a68; color: #f75a68; padding: 20px; border-radius: 8px; text-align: center; }
    </style>
</head>
<body>
    <div id="app">Caricamento in corso...</div>

    <script>
        async function init() {
            try {
                // Caricamento sicuro con gestione errori
                const resUpcoming = await fetch('upcoming.json?t=' + Date.now());
                if (!resUpcoming.ok) throw new Error("File upcoming.json non trovato");
                const upcoming = await resUpcoming.json();

                const resH2H = await fetch('h2h_data.json?t=' + Date.now());
                if (!resH2H.ok) throw new Error("File h2h_data.json non trovato");
                const h2h = await resH2H.json();

                // Se arriviamo qui, i dati sono validi
                document.getElementById('app').innerHTML = "Dati caricati con successo!";
                // ... (qui andrebbe la tua logica di render)
                
            } catch (e) {
                document.getElementById('app').innerHTML = `<div class="error-box">Errore di caricamento: ${e.message}. Controlla i file JSON su GitHub.</div>`;
            }
        }
        init();
    </script>
</body>
</html>
