<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TT Elite Series Analytics & Tracker</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #121214; color: #e1e1e6; margin: 0; padding: 15px; }
        h1, h2, h3 { color: #00b37e; text-align: center; }
        .container { max-width: 600px; margin: 0 auto; }
        
        /* Tracker Summary Box */
        .tracker-summary { background-color: #1a1a1e; border: 2px solid #323238; border-radius: 8px; padding: 15px; margin-bottom: 20px; text-align: center; }
        .tracker-grid { display: flex; justify-content: space-around; margin-top: 10px; }
        .tracker-val { font-size: 1.5em; font-weight: bold; }
        
        .section-box { background-color: #202024; border-radius: 8px; padding: 15px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .match-card { background-color: #29292e; border: 1px solid #323238; border-radius: 6px; padding: 12px; margin: 8px 0; cursor: pointer; transition: transform 0.2s, border-color 0.2s; }
        .match-card:hover { border-color: #00b37e; }
        .match-info { display: flex; justify-content: space-between; align-items: center; }
        .time { font-size: 0.85em; color: #8d8d99; background: #121214; padding: 4px 8px; border-radius: 4px; }
        .players { font-size: 1em; color: #e1e1e6; flex-grow: 1; margin-left: 15px; }
        
        .match-details { display: none; margin-top: 15px; padding-top: 15px; border-top: 1px dashed #323238; animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
        
        .stat-grid { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 10px; }
        .stat-box { flex: 1; min-width: 120px; background: #121214; padding: 12px; border-radius: 6px; text-align: center; border: 1px solid #323238; }
        .full-width { flex: 1 1 100%; }
        .stat-label { display: block; font-size: 0.8em; color: #8d8d99; margin-bottom: 5px; }
        .stat-value { font-size: 1.3em; font-weight: bold; }
        .pct-value { font-size: 0.6em; color: #8d8d99; font-weight: normal; margin-left: 4px; }
        
        .text-green { color: #00b37e; }
        .text-blue { color: #4ea8de; }
        .text-yellow { color: #fba94c; }
        .text-red { color: #f75a68; }
        
        /* Betting UI Elements */
        .bet-section { background-color: #121214; padding: 12px; border-radius: 6px; margin-top: 15px; border: 1px solid #323238; }
        .bet-title { font-size: 0.9em; color: #8d8d99; margin-bottom: 10px; text-align: center; display: block; }
        .bet-inputs { display: flex; gap: 10px; margin-bottom: 10px; }
        .bet-input-group { flex: 1; display: flex; flex-direction: column; }
        .bet-input-group label { font-size: 0.75em; color: #8d8d99; margin-bottom: 3px; }
        .bet-input-group input { background-color: #202024; border: 1px solid #323238; color: #fff; padding: 8px; border-radius: 4px; text-align: center; }
        .bet-buttons { display: flex; gap: 10px; }
        .btn { flex: 1; padding: 10px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; transition: opacity 0.2s; color: #fff; }
        .btn:hover { opacity: 0.8; }
        .btn-win { background-color: #00b37e; }
        .btn-lose { background-color: #f75a68; }
        .btn-reset { background-color: #323238; }
        
        .bet-status { margin-top: 10px; text-align: center; font-weight: bold; padding: 8px; border-radius: 4px; }
        .status-win { background-color: rgba(0, 179, 126, 0.2); color: #00b37e; border: 1px solid #00b37e; }
        .status-lose { background-color: rgba(247, 90, 104, 0.2); color: #f75a68; border: 1px solid #f75a68; }

        .history-list { margin-top: 15px; }
        .history-item { display: flex; justify-content: space-between; font-size: 0.9em; padding: 8px 0; border-bottom: 1px solid #323238; }
        .history-date { color: #8d8d99; }
        .history-score { font-weight: bold; }
        .history-points { color: #fba94c; }
        .error-box { background-color: #f75a68; color: #fff; padding: 12px; border-radius: 6px; text-align: center; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>TT Elite Series Dashboard</h1>
        
        <div class="tracker-summary">
            <h3 style="margin-top:0; color:#e1e1e6;">Bilancio Scommesse</h3>
            <div class="tracker-grid">
                <div>
                    <span class="stat-label">Investito</span>
                    <span class="tracker-val" id="total-invested">0.00 €</span>
                </div>
                <div>
                    <span class="stat-label">Ritorni</span>
                    <span class="tracker-val" id="total-returned">0.00 €</span>
                </div>
                <div>
                    <span class="stat-label">Netto</span>
                    <span class="tracker-val" id="total-profit">0.00 €</span>
                </div>
            </div>
            <button onclick="clearAllBets()" class="btn btn-reset" style="margin-top:15px; width: 100%; font-size: 0.8em; padding: 6px;">Azzera Storico Scommesse</button>
        </div>

        <div class="section-box">
            <h2>Partite in Programma</h2>
            <div id="upcoming-list">Caricamento in corso...</div>
        </div>
    </div>

    <script>
        // Gestione Dati Scommesse (LocalStorage)
        let betsCache = JSON.parse(localStorage.getItem('tt_bets')) || {};

        function saveBet(matchId, amount, odds, status) {
            betsCache[matchId] = {
                amount: parseFloat(amount) || 0,
                odds: parseFloat(odds) || 1,
                status: status // 'win' or 'lose'
            };
            localStorage.setItem('tt_bets', JSON.stringify(betsCache));
            updateSummary();
            renderBetUI(matchId);
        }

        function removeBet(matchId) {
            delete betsCache[matchId];
            localStorage.setItem('tt_bets', JSON.stringify(betsCache));
            updateSummary();
            renderBetUI(matchId);
        }

        function clearAllBets() {
            if(confirm("Sei sicuro di voler cancellare tutto lo storico delle scommesse dal telefono?")) {
                betsCache = {};
                localStorage.removeItem('tt_bets');
                updateSummary();
                // Ricarica la pagina per resettare la UI
                location.reload();
            }
        }

        function updateSummary() {
            let invested = 0;
            let returned = 0;

            for (const key in betsCache) {
                const bet = betsCache[key];
                invested += bet.amount;
                if (bet.status === 'win') {
                    returned += (bet.amount * bet.odds);
                }
            }

            const profit = returned - invested;

            document.getElementById('total-invested').innerText = invested.toFixed(2) + " €";
            document.getElementById('total-returned').innerText = returned.toFixed(2) + " €";
            
            const profitEl = document.getElementById('total-profit');
            profitEl.innerText = (profit > 0 ? "+" : "") + profit.toFixed(2) + " €";
            profitEl.className = "tracker-val " + (profit > 0 ? "text-green" : (profit < 0 ? "text-red" : "text-yellow"));
        }

        // Setup Iniziale
        document.addEventListener("DOMContentLoaded", function() {
            updateSummary();
            loadDashboardData();
        });

        async function loadDashboardData() {
            try {
                // Aggiungiamo un parametro random per forzare il ricaricamento ed evitare la cache del browser sui JSON
                const nocache = new Date().getTime();
                const upcomingFetch = await fetch(`upcoming.json?v=${nocache}`);
                const upcomingPayload = await upcomingFetch.json();
                
                const h2hFetch = await fetch(`h2h_data.json?v=${nocache}`);
                const h2hPayload = await h2hFetch.json();
                
                renderUpcomingContainer(upcomingPayload.results || [], h2hPayload || {});
            } catch (error) {
                console.error("Data error:", error);
                document.getElementById('upcoming-list').innerHTML = 
                    `<div class="error-box">Errore nel caricamento dei dati JSON. Attendi che l'azione su GitHub finisca.</div>`;
            }
        }

        function renderUpcomingContainer(upcomingList, h2hDictionary) {
            const listContainer = document.getElementById('upcoming-list');
            if (upcomingList.length === 0) {
                listContainer.innerHTML = "<p style='text-align:center; color:#8d8d99;'>Nessun match imminente.</p>";
                return;
            }
            
            listContainer.innerHTML = "";
            upcomingList.forEach(matchObject => {
                const homeTeamName = matchObject.home.name;
                const awayTeamName = matchObject.away.name;
                const matchId = matchObject.id;
                
                const unixTimestamp = parseInt(matchObject.time) * 1000;
                const formattedTime = new Date(unixTimestamp).toLocaleString('it-IT', { hour: '2-digit', minute: '2-digit' });
                
                const elementCard = document.createElement('div');
                elementCard.className = 'match-card';
                
                elementCard.innerHTML = `
                    <div class="match-info" onclick="toggleDetails('${matchId}', '${homeTeamName}', '${awayTeamName}')">
                        <span class="time">${formattedTime}</span>
                        <span class="players"><strong>${homeTeamName}</strong> vs <strong>${awayTeamName}</strong></span>
                    </div>
                    <div class="match-details" id="details-${matchId}">
                        <div id="stats-${matchId}"></div>
                        <div id="bet-ui-${matchId}"></div>
                    </div>
                `;
                
                listContainer.appendChild(elementCard);
                
                // Pre-salviamo i dati storici nell'oggetto window per poterli chiamare quando si clicca
                window[`h2h_${matchId}`] = h2hDictionary[matchId] || [];
            });
        }

        window.toggleDetails = function(matchId, homeTeam, awayTeam) {
            const detailsContainer = document.getElementById(`details-${matchId}`);
            const statsContainer = document.getElementById(`stats-${matchId}`);
            
            if (detailsContainer.style.display === 'block') {
                detailsContainer.style.display = 'none';
            } else {
                // Chiude tutti gli altri
                document.querySelectorAll('.match-details').forEach(el => el.style.display = 'none');
                detailsContainer.style.display = 'block';
                
                if (statsContainer.innerHTML.trim() === "") {
                    processHeadToHead(homeTeam, awayTeam, window[`h2h_${matchId}`], statsContainer);
                    renderBetUI(matchId);
                }
            }
        };

        window.handleBetAction = function(matchId, status) {
            const amountInput = document.getElementById(`amount-${matchId}`).value.replace(',', '.');
            const oddsInput = document.getElementById(`odds-${matchId}`).value.replace(',', '.');
            
            if(!amountInput || !oddsInput) {
                alert("Inserisci sia l'importo che la quota prima di salvare!");
                return;
            }
            saveBet(matchId, amountInput, oddsInput, status);
        };

        window.renderBetUI = function(matchId) {
            const betContainer = document.getElementById(`bet-ui-${matchId}`);
            const existingBet = betsCache[matchId];

            if (existingBet) {
                const profitText = existingBet.status === 'win' 
                    ? `+ ${((existingBet.amount * existingBet.odds) - existingBet.amount).toFixed(2)} €` 
                    : `- ${existingBet.amount.toFixed(2)} €`;
                
                const statusClass = existingBet.status === 'win' ? 'status-win' : 'status-lose';
                const labelText = existingBet.status === 'win' ? 'SCOMMESSA VINTA' : 'SCOMMESSA PERSA';

                betContainer.innerHTML = `
                    <div class="bet-section">
                        <div class="bet-status ${statusClass}">
                            ${labelText}<br>
                            <span style="font-size:0.8em; font-weight:normal;">Importo: ${existingBet.amount}€ | Quota: ${existingBet.odds} | Netto: ${profitText}</span>
                        </div>
                        <button onclick="removeBet('${matchId}')" class="btn btn-reset" style="width:100%; margin-top:10px; padding: 8px;">Annulla / Modifica</button>
                    </div>
                `;
            } else {
                betContainer.innerHTML = `
                    <div class="bet-section">
                        <span class="bet-title">Registra Scommessa</span>
                        <div class="bet-inputs">
                            <div class="bet-input-group">
                                <label>Importo (€)</label>
                                <input type="number" id="amount-${matchId}" step="0.50" placeholder="Es. 10">
                            </div>
                            <div class="bet-input-group">
                                <label>Quota</label>
                                <input type="number" id="odds-${matchId}" step="0.01" placeholder="Es. 1.85">
                            </div>
                        </div>
                        <div class="bet-buttons">
                            <button onclick="handleBetAction('${matchId}', 'win')" class="btn btn-win">VINTO</button>
                            <button onclick="handleBetAction('${matchId}', 'lose')" class="btn btn-lose">PERSA</button>
                        </div>
                    </div>
                `;
            }
        };

        function processHeadToHead(playerOne, playerTwo, historicalRecords, containerElement) {
            const filteredEncounters = historicalRecords.slice(0, 18);
            
            if (filteredEncounters.length === 0) {
                containerElement.innerHTML = "<p style='text-align:center; color:#8d8d99; margin-bottom:15px;'>Nessun precedente storico su BetsAPI.</p>";
                return;
            }
            
            let playerOneWinsCount = 0;
            let playerTwoWinsCount = 0;
            let totalAggregatedPoints = 0;
            let validMatchesWithDetails = 0;
            let htmlHistoryRows = "";
            
            filteredEncounters.forEach(record => {
                const rawScoreString = record.ss || "0-0";
                const absoluteScoreParts = rawScoreString.split('-');
                const homeScoreInt = parseInt(absoluteScoreParts[0]) || 0;
                const awayScoreInt = parseInt(absoluteScoreParts[1]) || 0;
                
                let winningSideName = "";
                if (homeScoreInt > awayScoreInt) { winningSideName = record.home.name; } 
                else if (awayScoreInt > homeScoreInt) { winningSideName = record.away.name; }
                
                if (winningSideName === playerOne) { playerOneWinsCount++; } 
                else if (winningSideName === playerTwo) { playerTwoWinsCount++; }
                
                let specificMatchSum = 0;
                let calculationFlag = false;
                
                if (record.scores) {
                    if (typeof record.scores === 'object' && record.scores !== null) {
                        Object.values(record.scores).forEach(setObject => {
                            if (setObject.home !== undefined && setObject.away !== undefined) {
                                specificMatchSum += (parseInt(setObject.home) || 0) + (parseInt(setObject.away) || 0);
                                calculationFlag = true;
                            }
                        });
                    } else if (typeof record.scores === 'string') {
                        record.scores.split(',').forEach(setSubString => {
                            const pointSplit = setSubString.split('-');
                            if (pointSplit.length === 2) {
                                specificMatchSum += (parseInt(pointSplit[0]) || 0) + (parseInt(pointSplit[1]) || 0);
                                calculationFlag = true;
                            }
                        });
                    }
                }
                
                if (calculationFlag && specificMatchSum > 0) {
                    totalAggregatedPoints += specificMatchSum;
                    validMatchesWithDetails++;
                }
                
                const labelsPointsOutput = specificMatchSum > 0 ? `(${specificMatchSum} pts)` : "";
                const dateStringFormatted = new Date(parseInt(record.time) * 1000).toLocaleDateString('it-IT');
                
                htmlHistoryRows += `
                    <div class="history-item">
                        <span class="history-date">${dateStringFormatted}</span>
                        <span>${record.home.name} <span class="history-score">${rawScoreString}</span> ${record.away.name}</span>
                        <span class="history-points">${labelsPointsOutput}</span>
                    </div>
                `;
            });
            
            const totalPlayed = filteredEncounters.length;
            const p1WinPct = totalPlayed > 0 ? Math.round((playerOneWinsCount / totalPlayed) * 100) : 0;
            const p2WinPct = totalPlayed > 0 ? Math.round((playerTwoWinsCount / totalPlayed) * 100) : 0;
            const calculatedFinalAverage = validMatchesWithDetails > 0 ? (totalAggregatedPoints / validMatchesWithDetails).toFixed(1) : "N/D";
            
            containerElement.innerHTML = `
                <div class="stat-grid">
                    <div class="stat-box">
                        <span class="stat-label">Vittorie ${playerOne}</span>
                        <span class="stat-value text-green">${playerOneWinsCount} <span class="pct-value">(${p1WinPct}%)</span></span>
                    </div>
                    <div class="stat-box">
                        <span class="stat-label">Vittorie ${playerTwo}</span>
                        <span class="stat-value text-blue">${playerTwoWinsCount} <span class="pct-value">(${p2WinPct}%)</span></span>
                    </div>
                    <div class="stat-box full-width">
                        <span class="stat-label">Media Punti Totali (su ${validMatchesWithDetails} match con set)</span>
                        <span class="stat-value text-yellow">${calculatedFinalAverage} punti</span>
                    </div>
                </div>
                <div class="history-list">
                    <h3 style="font-size: 1.1em; color: #8d8d99; margin-bottom:5px;">Storico ultimi ${totalPlayed} incontri</h3>
                    ${htmlHistoryRows}
                </div>
            `;
        }
    </script>
</body>
</html>
