<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>TT Elite Pro Analytics</title>
    <style>
        /* Aggiunte stile Pro */
        .trend-badge { font-size: 0.7em; padding: 2px 6px; border-radius: 10px; margin-left: 5px; }
        .value-bet { border: 2px solid #fba94c !important; box-shadow: 0 0 10px rgba(251, 169, 76, 0.3); }
        .fair-value-text { font-size: 0.75em; color: #fba94c; margin-top: 5px; display: block; }
    </style>
</head>
<body>
    <script>
        // Logica Fair Value (Esempio)
        function checkValueBet(oddsOffered, winPct) {
            const fairOdds = winPct > 0 ? (100 / winPct).toFixed(2) : 0;
            if (fairOdds > 0 && oddsOffered > fairOdds) {
                return { isValue: true, fair: fairOdds };
            }
            return { isValue: false, fair: fairOdds };
        }

        // Nella funzione renderBetUI, aggiungi un listener sugli input:
        // Quando inserisci la quota, confrontala con la percentuale H2H calcolata 
        // e applica la classe .value-bet al contenitore se è una Value Bet.
    </script>
</body>
</html>
