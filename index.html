<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Pong - Archivio H2H</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f7f6; padding: 20px; color: #333; }
        .container { max-width: 600px; margin: 0 auto; background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #2c3e50; font-size: 22px; }
        select { width: 100%; padding: 12px; margin-top: 10px; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; }
        .stats-box { margin-top: 20px; padding: 15px; background-color: #e8f4f8; border-left: 5px solid #3498db; border-radius: 4px; display: none; }
        .stat-row { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 16px; }
        .stat-value { font-weight: bold; color: #2980b9; }
        #error-msg { color: red; text-align: center; font-size: 14px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>🏓 Archivio H2H Aggiornato</h1>
    
    <select id="matchSelect" onchange="calcolaStatistiche()">
        <option value="">Seleziona una sfida...</option>
    </select>
    
    <div id="error-msg"></div>

    <div id="risultati" class="stats-box">
        <div class="stat-row"><span>Vittorie G1:</span> <span id="winG1" class="stat-value">0</span></div>
        <div class="stat-row"><span>Vittorie G2:</span> <span id="winG2" class="stat-value">0</span></div>
        <div class="stat-row"><span>Media Punti:</span> <span id="avgPoints" class="stat-value">0.0</span></div>
        <div class="stat-row"><span>Totale Match:</span> <span id="totMatches" class="stat-value">0</span></div>
    </div>
</div>

<script>
    let storicoMatch = [];

    // Caricamento dati con timestamp per evitare la cache
    fetch('database_h2h.json?t=' + new Date().getTime())
        .then(response => {
            if (!response.ok) throw new Error("File JSON non trovato!");
            return response.json();
        })
        .then(data => {
            storicoMatch = data;
            const select = document.getElementById('matchSelect');
            const coppie = new Set();
            
            data.forEach(m => coppie.add([m.g1, m.g2].sort().join(" vs ")));
            
            coppie.forEach(c => {
                let opt = document.createElement('option');
                opt.value = c; opt.textContent = c;
                select.appendChild(opt);
            });
        })
        .catch(err => {
            document.getElementById('error-msg').textContent = "Errore: " + err.message + ". Verifica che il file JSON sia stato creato.";
        });

    function calcolaStatistiche() {
        const selezione = document.getElementById('matchSelect').value;
        const box = document.getElementById('risultati');
        if (!selezione) { box.style.display = 'none'; return; }

        const [gA, gB] = selezione.split(" vs ");
        let vA = 0, vB = 0, somma = 0, count = 0;

        storicoMatch.forEach(m => {
            if ((m.g1 === gA && m.g2 === gB) || (m.g1 === gB && m.g2 === gA)) {
                count++;
                somma += m.punti_totali;
                if (m.vincitore === gA) vA++;
                else vB++;
            }
        });

        document.getElementById('winG1').textContent = vA;
        document.getElementById('winG2').textContent = vB;
        document.getElementById('avgPoints').textContent = (somma / count).toFixed(1);
        document.getElementById('totMatches').textContent = count;
        box.style.display = 'block';
    }
</script>

</body>
</html>
