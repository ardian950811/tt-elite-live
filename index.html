<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stato di Forma - Ping Pong</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f8f9fa;
            padding: 20px;
        }
        
        h2 {
            color: #333;
        }

        /* Stile del riquadro del giocatore */
        .player-card {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            max-width: 400px;
        }

        .player-name {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 15px;
            color: #222;
        }

        /* Struttura della riga della singola partita */
        .match-row {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
        }

        /* IL QUADRATO VERDE (VITTORIA) */
        .box-vittoria {
            width: 35px;
            height: 35px;
            background-color: #28a745;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 18px;
            border-radius: 4px;
            margin-right: 15px;
        }

        /* IL QUADRATO ROSSO (SCONFITTA) */
        .box-sconfitta {
            width: 35px;
            height: 35px;
            background-color: #dc3545;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 18px;
            border-radius: 4px;
            margin-right: 15px;
        }

        /* Testo di fianco al quadrato */
        .match-info {
            font-size: 15px;
            color: #555;
        }
    </style>
</head>
<body>

    <h2>🏓 Stato di Forma Odierno</h2>

    <div class="player-card">
        <div class="player-name">Jan Zandecki</div>
        
        <div class="match-row">
            <div class="box-vittoria">V</div>
            <div class="match-info">Ore 09:30 - contro Jaime Lama</div>
        </div>
        
        <div class="match-row">
            <div class="box-sconfitta">R</div>
            <div class="match-info">Ore 11:15 - contro Alex Moreno</div>
        </div>

        <div class="match-row">
            <div class="box-vittoria">V</div>
            <div class="match-info">Ore 14:00 - contro Dawid Pelc</div>
        </div>
    </div>

    <div class="player-card">
        <div class="player-name">Jaime Lama</div>
        
        <div class="match-row">
            <div class="box-sconfitta">R</div>
            <div class="match-info">Ore 09:30 - contro Jan Zandecki</div>
        </div>
        
        <div class="match-row">
            <div class="box-sconfitta">R</div>
            <div class="match-info">Ore 12:00 - contro Dawid Pelc</div>
        </div>
    </div>

</body>
</html>
