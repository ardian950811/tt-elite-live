<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TT Elite Pro Dashboard</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #121214; color: #e1e1e6; margin: 0; padding: 15px; }
        .container { max-width: 600px; margin: 0 auto; }
        h1 { color: #00b37e; text-align: center; }
        .match-card { background-color: #202024; border: 1px solid #323238; border-radius: 8px; padding: 15px; margin: 10px 0; }
        .btn { padding: 10px 15px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; color: white; margin-top: 5px; }
        .value-bet { border: 2px solid #fba94c !important; box-shadow: 0 0 10px rgba(251, 169, 76, 0.2); }
        .fair-val { font-size: 0.85em; color: #fba94c; display: block; margin-top: 5px; }
        .trend { font-size: 0.8em; padding: 2px 8px; border-radius: 10px; background: #323238; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Dashboard Pro</h1>
        <div id="list">Caricamento in corso...</div>
    </div>

    <script>
        async function load() {
            try {
                const [resU, resH] = await Promise.all([
                    fetch('upcoming.json?t=' + Date.now()),
                    fetch('h2h_data.json?t=' + Date.now())
                ]);
                const upcoming = await resU.json();
                const h2h = await resH.json();
                render(upcoming.results || [], h2h || {});
            } catch(e) {
                document.getElementById('list').innerHTML = `<div style="color:red">Errore caricamento dati: ${e.message}</div>`;
            }
        }

        function render(matches, h2hDict) {
            const list = document.getElementById('list');
            list.innerHTML = matches.length === 0 ? "Nessun match trovato." : "";
            
            matches.forEach(m => {
                const history = h2hDict[m.id] || [];
                const winsHome = history.filter(x => x.home.name === m.home.name).length;
                const winPct = history.length > 0 ? Math.round((winsHome / history.length) * 100) : 50;
                
                const card = document.createElement('div');
                card.className = 'match-card';
                card.innerHTML = `
                    <div style="display:flex; justify-content:space-between;">
                        <strong>${m.home.name} vs ${m.away.name}</strong>
                        <span class="trend">${winPct}% H2H</span>
                    </div>
                    <div id="bet-area-${m.id}" style="margin-top:15px;">
                        <input type="number" id="odds-${m.id}" step="0.01" placeholder="Quota Bookmaker" 
                               oninput="checkValue('${m.id}', ${winPct})" style="padding:8px; border-radius:4px; border:1px solid #323238;">
                        <div id="val-msg-${m.id}" class="fair-val"></div>
                    </div>
                `;
                list.appendChild(card);
            });
        }

        function checkValue(id, winPct) {
            const oddsInput = document.getElementById('odds-'+id);
            const msg = document.getElementById('val-msg-'+id);
            const area = document.getElementById('bet-area-'+id);
            const odds = parseFloat(oddsInput.value);
            
            if (!odds) { msg.innerHTML = ""; area.className = ""; return; }
            
            // Formula Fair Value semplificata
            const fairOdds = winPct > 0 ? (100 / winPct) : 0;
            
            if (odds > fairOdds) {
                msg.innerHTML = `VALUE BET! (Equa: ${fairOdds.toFixed(2)})`;
                area.className = "value-bet";
            } else {
                msg.innerHTML = `Quota equa: ${fairOdds.toFixed(2)}`;
                area.className = "";
            }
        }

        load();
    </script>
</body>
</html>
