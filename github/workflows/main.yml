name: Aggiornamento Scores24
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - run: python scraper_tt.py
    - run: |
        git config --global user.name "GitHub Action"
        git config --global user.email "action@github.com"
        git add database_h2h.json
        git commit -m "Aggiornamento dati scores24" || echo "Nessuna modifica"
        git push origin main
